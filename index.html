<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Gemini Clone - Dark Mode</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* ==========================================
           1. CSS Variables & Reset (Dark Mode)
           ========================================== */
        :root {
            --bg-main: #131314;
            --bg-input: #1e1f20;
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --border-subtle: #444746;
            --primary-blue: #a8c7fa; 
            --user-bubble: #1e1f20;
            --hover-bg: rgba(255, 255, 255, 0.08);
            --md3-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            
            /* Typography */
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Roboto', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Dark Mode Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444746; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #5f6368; }

        /* ==========================================
           2. Header Navigation
           ========================================== */
        .top-nav {
            padding: 16px 24px;
            font-family: var(--font-heading);
            font-size: 1.35rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between; 
            align-items: center;
            user-select: none;
        }

        .top-nav .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-nav .logo span {
            font-size: 1.5rem;
            background: -webkit-linear-gradient(45deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ==========================================
           3. Chat Container & Messages & Animations
           ========================================== */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 140px 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
        }

        /* Entrance Animation for all messages */
        @keyframes slideUpFadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-row {
            display: flex;
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            line-height: 1.6;
            letter-spacing: 0.2px;
            font-size: 1rem;
            animation: slideUpFadeIn 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
        }

        /* User Message Styling */
        .message-row.user { justify-content: flex-end; }
        .message-row.user .message-content {
            background-color: var(--user-bubble);
            padding: 12px 20px;
            border-radius: 24px 24px 4px 24px;
            color: var(--text-primary);
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap; 
        }

        /* Bot Message Styling */
        .message-row.bot {
            justify-content: flex-start;
            gap: 16px;
        }
        .message-row.bot .message-content {
            padding: 4px 0;
            color: var(--text-primary);
            max-width: 90%;
            width: 100%;
        }

        /* Avatar Animations */
        .bot-avatar {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Idle State */
        .bot-avatar.idle svg {
            animation: breathe 4s infinite ease-in-out;
        }

        /* Generating / Thinking State */
        .bot-avatar.generating svg {
            animation: geminiThink 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(155, 114, 203, 0.8));
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(155, 114, 203, 0.3)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 10px rgba(155, 114, 203, 0.6)); }
        }

        /* Removed rotation, kept the pulsing scale */
        @keyframes geminiThink {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Pulsing Dots for Loading Text */
        .typing-dots {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 100%;
            padding-top: 8px;
        }

        .dot-pulse {
            width: 8px; height: 8px; 
            background-color: var(--primary-blue);
            border-radius: 50%;
            animation: pulseDot 1.4s infinite ease-in-out both;
        }

        @keyframes pulseDot {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ==========================================
           4. Markdown & Rich Text Styling (marked.js)
           ========================================== */
        .bot-message-body p { margin-bottom: 16px; }
        .bot-message-body p:last-child { margin-bottom: 0; }
        .bot-message-body strong { font-weight: 600; color: #fff; }
        
        .bot-message-body h1, .bot-message-body h2, .bot-message-body h3 {
            font-family: var(--font-heading);
            margin: 24px 0 12px 0;
            color: var(--text-primary);
        }
        .bot-message-body h1 { font-size: 1.5rem; }
        .bot-message-body h2 { font-size: 1.3rem; }
        .bot-message-body h3 { font-size: 1.1rem; }

        .bot-message-body ul, .bot-message-body ol { margin: 12px 0 16px 28px; }
        .bot-message-body li { margin-bottom: 6px; }

        .bot-message-body code {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-input);
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 0.9em;
            color: #ff8b94; 
        }

        .bot-message-body pre {
            background-color: #000000;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid var(--border-subtle);
        }
        .bot-message-body pre code {
            background-color: transparent; color: inherit; padding: 0; font-size: 0.95em; border: none;
        }

        /* ==========================================
           5. Floating Input Area & Buttons
           ========================================== */
        .input-wrapper {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 820px; background-color: var(--bg-input);
            border-radius: 32px; display: flex; align-items: flex-end; padding: 12px 16px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .input-wrapper:focus-within { background-color: #282a2c; box-shadow: var(--md3-shadow); }

        .input-tools { display: flex; gap: 4px; padding-bottom: 4px; margin-right: 8px; }

        .icon-btn {
            background: none; border: none; width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--text-secondary); transition: background-color 0.2s, color 0.2s;
        }
        .icon-btn:hover { background-color: var(--hover-bg); color: var(--text-primary); }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; transition: fill 0.2s; }

        #send-btn { margin-left: 8px; margin-bottom: 4px; }
        #send-btn svg { width: 36px; height: 36px; fill: none; }

        #user-input {
            flex: 1; background: transparent; border: none; outline: none; padding: 12px 0;
            font-family: var(--font-body); font-size: 1rem; max-height: 200px; resize: none;
            color: var(--text-primary); line-height: 1.5;
        }
        #user-input::placeholder { color: #8e918f; }

        /* ==========================================
           6. User Note Modal (Dark Mode MD3)
           ========================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: var(--bg-main); width: 90%; max-width: 500px; padding: 32px;
            border-radius: 28px; box-shadow: var(--md3-shadow); display: flex; flex-direction: column;
            gap: 20px; border: 1px solid var(--border-subtle);
        }
        .modal-content h3 { font-family: var(--font-heading); font-weight: 500; font-size: 1.5rem; color: var(--text-primary); }
        .modal-content p { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; }

        .modal-content textarea {
            width: 100%; height: 150px; padding: 16px; background: var(--bg-input);
            color: var(--text-primary); border: 1px solid var(--border-subtle); border-radius: 12px;
            resize: none; outline: none; font-family: var(--font-body); font-size: 1rem; transition: border-color 0.2s;
        }
        .modal-content textarea:focus { border-color: var(--primary-blue); }

        .modal-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }

        .btn { padding: 10px 24px; border-radius: 24px; border: none; cursor: pointer; font-weight: 500; font-size: 0.95rem; transition: background 0.2s; }
        .btn-cancel { background: transparent; color: var(--primary-blue); }
        .btn-cancel:hover { background: var(--hover-bg); }
        .btn-save { background: var(--primary-blue); color: #000; }
        .btn-save:hover { background: #bcdcff; }
        .btn-reset { background: transparent; color: #f28b82; margin-right: auto; padding: 10px 16px; }
        .btn-reset:hover { background: rgba(242, 139, 130, 0.1); }

        .system-notice { text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin: 16px 0; font-family: var(--font-body); animation: slideUpFadeIn 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;}
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="logo">
            <span>✦</span> Gemini???
        </div>
        
        <button class="icon-btn" id="user-note-btn" title="시스템 프롬프트 설정">
            <svg viewBox="0 0 100 100" fill="currentColor" fill-rule="evenodd" xmlns="http://www.w3.org/2000/svg">
                <path d="M 38 92 L 22 92 C 16.5 92 12 87.5 12 82 L 12 22 C 12 16.5 16.5 12 22 12 L 72 12 C 77.5 12 82 16.5 82 22 L 82 36 L 72 36 L 72 22 L 22 22 L 22 82 L 38 82 L 38 92 Z" />
                <rect x="26" y="32" width="38" height="8" rx="2" />
                <rect x="26" y="52" width="22" height="8" rx="2" />
                <path d="M 57 45 C 57 42.2 59.2 40 62 40 L 78 40 C 80.8 40 83 42.2 83 45 L 83 75 L 70 88 L 57 75 Z M 65 50 L 65 71 L 70 77 L 75 71 L 75 50 Z" transform="translate(-12, 12) rotate(45 70 70)" />
            </svg>
        </button>
    </header>

    <main class="chat-container" id="chat-messages">
        <div class="message-row bot">
            <div class="bot-avatar idle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="gemini-grad-init" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4285f4" />
                            <stop offset="50%" stop-color="#9b72cb" />
                            <stop offset="100%" stop-color="#d96570" />
                        </linearGradient>
                    </defs>
                    <path d="M16 8C16 8 17 5 20 5C17 5 16 2 16 2C16 2 15 5 12 5C15 5 16 8 16 8Z" fill="url(#gemini-grad-init)"/>
                    <path d="M9.5 14.5C9.5 14.5 11 8.5 17 8.5C11 8.5 9.5 2.5 9.5 2.5C9.5 2.5 8 8.5 2 8.5C8 8.5 9.5 14.5 9.5 14.5Z" fill="url(#gemini-grad-init)"/>
                </svg>
            </div>
            <div class="message-content bot-message-body"></div>
        </div>
    </main>

    <div class="input-wrapper">
        <div class="input-tools">
            <button class="icon-btn" id="gemini-mode-btn" title="대화 초기화">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.65 6.35A7.95 7.95 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </button>
        </div>

        <textarea id="user-input" rows="1" placeholder="Gemini???에게 물어보세요" autocomplete="off"></textarea>
        
        <button class="icon-btn" id="send-btn" title="보내기">
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" fill="#2955c8" />
                <path d="M20 27 V13 M13 20 l7 -7 l7 7" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
        </button>
    </div>

    <div class="modal-overlay" id="note-modal">
        <div class="modal-content">
            <h3>시스템 프롬프트 설정</h3>
            <p>AI의 페르소나, 역할, 또는 답변 방식을 지시하는 배경 컨텍스트를 입력하세요.</p>
            <textarea id="system-prompt-input" placeholder="예: 당신은 친절한 한국어 교사입니다. 문법 오류를 항상 수정해주세요."></textarea>
            <div class="modal-actions">
                <button class="btn btn-reset" id="reset-note-btn">초기화</button>
                <button class="btn btn-cancel" id="close-modal-btn">취소</button>
                <button class="btn btn-save" id="save-note-btn">저장</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛑 API CONFIGURATION 🛑
        // ==========================================
        const API_KEY = 'AQ.Ab8RN6IVP1kQOkiDBRZZ_eb4Elr2YbUOSGMOILsWn5sSje2jwg'; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${API_KEY}`;

        // Configure Marked.js Options
        marked.setOptions({ breaks: true, gfm: true });

        // DOM Elements
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const geminiModeBtn = document.getElementById('gemini-mode-btn');
        const userNoteBtn = document.getElementById('user-note-btn');
        const noteModal = document.getElementById('note-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const saveNoteBtn = document.getElementById('save-note-btn');
        const resetNoteBtn = document.getElementById('reset-note-btn');
        const systemPromptInput = document.getElementById('system-prompt-input');

        // State Variables & Initialization
        let chatHistory = [];
        
        // INTERNAL DEFAULT PROMPT - Hardcoded fallback behavior
        const INTERNAL_DEFAULT_PROMPT = `You are a versatile AI assistant, similar to Google Gemini. Your primary task is to provide accurate, helpful, and natural-sounding responses, always adapting seamlessly to the language used by the user.`;
        
        // Use sessionStorage instead of localStorage so data clears when the session ends
        let savedUserPrompt = sessionStorage.getItem('gemini_clone_system_prompt');
        let currentSystemInstruction = savedUserPrompt && savedUserPrompt.trim() !== '' ? savedUserPrompt : INTERNAL_DEFAULT_PROMPT;

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px';
        });

        // Appends System Notice
        function appendNotice(text) {
            const noticeDiv = document.createElement('div');
            noticeDiv.classList.add('system-notice');
            noticeDiv.textContent = text;
            chatMessages.appendChild(noticeDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Appends Regular Messages
        function appendMessage(sender, text) {
            const rowDiv = document.createElement('div');
            rowDiv.classList.add('message-row', sender);

            if (sender === 'bot') {
                rowDiv.innerHTML = `
                    <div class="bot-avatar idle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="gemini-grad-${Date.now()}" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#4285f4" />
                                    <stop offset="50%" stop-color="#9b72cb" />
                                    <stop offset="100%" stop-color="#d96570" />
                                </linearGradient>
                            </defs>
                            <path d="M16 8C16 8 17 5 20 5C17 5 16 2 16 2C16 2 15 5 12 5C15 5 16 8 16 8Z" fill="url(#gemini-grad-${Date.now()})"/>
                            <path d="M9.5 14.5C9.5 14.5 11 8.5 17 8.5C11 8.5 9.5 2.5 9.5 2.5C9.5 2.5 8 8.5 2 8.5C8 8.5 9.5 14.5 9.5 14.5Z" fill="url(#gemini-grad-${Date.now()})"/>
                        </svg>
                    </div>
                    <div class="message-content bot-message-body">${marked.parse(text)}</div>
                `;
            } else {
                rowDiv.innerHTML = `
                    <div class="message-content">${text}</div>
                `;
            }

            chatMessages.appendChild(rowDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Shows the Thinking/Generating Animation
        function showThinkingIndicator() {
            const rowDiv = document.createElement('div');
            rowDiv.classList.add('message-row', 'bot');
            rowDiv.id = 'thinking-indicator';
            
            rowDiv.innerHTML = `
                <div class="bot-avatar generating">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="gemini-grad-think" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4285f4" />
                                <stop offset="50%" stop-color="#9b72cb" />
                                <stop offset="100%" stop-color="#d96570" />
                            </linearGradient>
                        </defs>
                        <path d="M16 8C16 8 17 5 20 5C17 5 16 2 16 2C16 2 15 5 12 5C15 5 16 8 16 8Z" fill="url(#gemini-grad-think)"/>
                        <path d="M9.5 14.5C9.5 14.5 11 8.5 17 8.5C11 8.5 9.5 2.5 9.5 2.5C9.5 2.5 8 8.5 2 8.5C8 8.5 9.5 14.5 9.5 14.5Z" fill="url(#gemini-grad-think)"/>
                    </svg>
                </div>
                <div class="message-content bot-message-body">
                    <div class="typing-dots">
                        <span class="dot-pulse"></span>
                        <span class="dot-pulse" style="animation-delay: 0.2s"></span>
                        <span class="dot-pulse" style="animation-delay: 0.4s"></span>
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(rowDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Removes the Thinking Animation
        function removeThinkingIndicator() {
            const indicator = document.getElementById('thinking-indicator');
            if (indicator) indicator.remove();
        }

        // Send Logic
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            userInput.disabled = true;
            sendBtn.disabled = true;

            chatHistory.push({
                role: "user",
                parts: [{ text: text }]
            });

            // Trigger Authentic Gemini Thinking Animation
            showThinkingIndicator();

            const payload = {
                systemInstruction: {
                    parts: [{ text: currentSystemInstruction }]
                },
                contents: chatHistory
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`API Error: ${response.status}`);

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;

                chatHistory.push({
                    role: "model",
                    parts: [{ text: botReply }]
                });

                removeThinkingIndicator();
                appendMessage('bot', botReply);

            } catch (error) {
                console.error("API Error:", error);
                removeThinkingIndicator();
                appendMessage('bot', "오류가 발생했습니다. 네트워크 연결이나 API 키를 확인해주세요.");
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // --- Event Listeners ---
        sendBtn.addEventListener('click', sendMessage);
        
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); 
                if (e.isComposing) return;
                sendMessage();
            }
        });

        // Chat Reset
        geminiModeBtn.addEventListener('click', () => {
            chatHistory = [];
            appendNotice("✦ 대화가 초기화되었습니다.");
        });

        // User Note Modal Behavior
        userNoteBtn.addEventListener('click', () => {
            systemPromptInput.value = sessionStorage.getItem('gemini_clone_system_prompt') || '';
            noteModal.classList.add('active');
        });

        closeModalBtn.addEventListener('click', () => noteModal.classList.remove('active'));

        // Save Custom Prompt
        saveNoteBtn.addEventListener('click', () => {
            const newPrompt = systemPromptInput.value.trim();
            if (newPrompt) {
                currentSystemInstruction = newPrompt;
                sessionStorage.setItem('gemini_clone_system_prompt', newPrompt);
                appendNotice("✦ 시스템 프롬프트가 저장되었습니다.");
            } else {
                currentSystemInstruction = INTERNAL_DEFAULT_PROMPT;
                sessionStorage.removeItem('gemini_clone_system_prompt');
                appendNotice("✦ 시스템 프롬프트가 기본값으로 돌아갔습니다.");
            }
            noteModal.classList.remove('active');
        });

        // Explicit Reset Button
        resetNoteBtn.addEventListener('click', () => {
            currentSystemInstruction = INTERNAL_DEFAULT_PROMPT;
            sessionStorage.removeItem('gemini_clone_system_prompt');
            systemPromptInput.value = '';
            noteModal.classList.remove('active');
            appendNotice("✦ 시스템 프롬프트가 기본값으로 초기화되었습니다.");
        });

        // Click Outside Modal to Close
        noteModal.addEventListener('click', (e) => {
            if (e.target === noteModal) noteModal.classList.remove('active');
        });

    </script>
</body>
</html>
